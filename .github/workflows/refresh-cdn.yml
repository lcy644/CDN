name: Purge jsDelivr Cache

# 触发条件：当 push 代码到 main 分支时
on:
  push:
    branches:
      - main  # 如果你的主分支是 master，请改为 master
    paths:
      - 'config.json' # 只有当这个文件发生变化时才执行，避免不必要的运行
  workflow_dispatch:

jobs:
  purge:
    runs-on: ubuntu-latest
    steps:
      - name: Purge jsDelivr Cache
        run: |
          # 核心命令：向 jsDelivr 发送清除缓存请求
          # 请替换 user/repo 为你的 用户名/仓库名
          # 请替换 config.json 为你的实际文件名
          
          curl -I https://purge.jsdelivr.net/gh/lcy644/CDN@main/config.json
          
          echo "Refresh request sent."